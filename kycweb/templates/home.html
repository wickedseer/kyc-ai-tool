    <div class="col-md-12 col-xl-6 text-center mx-auto">
        <button type="submit" class="btn btn-primary w-60" onclick="bindContent()">Submit</button>
    </div>

    <input style="visibility: hidden" type="text" name="type" id="file_type">

    <script>
        function bindContent() {
            var fileFields = document.querySelectorAll('.file-field');
            for (var i = 0; i < fileFields.length; i++) {
                if (fileFields[i].files.length > 0) {
                    var heading = document.getElementById(fileFields[i].id.replace('-file-field', '_heading'));
                    document.getElementById("file_type").value = heading.textContent;
                    return;
                }
            }

            document.getElementById("file_type").value = "";
        }


        $("form#myForm").submit(function (e) {
            var formData = new FormData(this);
            e.preventDefault();

            var panFile = document.forms[0].elements['pan-file-field'].value.length === 0;
            var aadharFile = document.forms[0].elements['aadhar-file-field'].value.length === 0;
            var gstFile = document.forms[0].elements['gst-file-field'].value.length === 0;

            if (panFile && aadharFile && gstFile) {
                alert("Please select at least one file before submitting.");
                e.preventDefault();
            }
            else {

                $('#loadingDiv').css('display', 'block');
                $('#result').css('visibility', 'hidden');
                $('#panResult').css('display', 'none');
                $('#aadharResult').css('display', 'none');
                $('#gstResult').css('display', 'none');


                $.ajax({
                    url: '/upload',
                    type: 'POST',
                    data: formData,
                    success: function (data) {
                       // alert(JSON.stringify(data));
                        $('#loadingDiv').css('display', 'none');
                        switch (document.getElementById("file_type").value) {
                            case 'PAN':
                                $('#result').css('visibility', 'visible');
                                $('#panResult').css('display', 'block');
                                $('#panName').val(data.fields.Name);
                                $('#panFathersName').val(data.fields.FatherName);
                                $('#panNum').val(data.fields.PANNo);
                                $('#panDob').val(data.fields.DateOfBirth);
                                $("#pan-file-field").val("");
                                break;
                            case 'Aadhar':
                                $('#result').css('visibility', 'visible');
                                $('#aadharResult').css('display', 'block');
                                $('#aadharName').val(data.fields.Name);
                                $('#aadharDob').val(data.fields.DateofBirth);
                                $('#aadharGender').val(data.fields.Gender);
                                $('#aadharNum').val(data.fields.AadharNo);
                                $("#aadhar-file-field").val("");
                                break;
                            case 'GST':
                                $('#result').css('visibility', 'visible');
                                $('#gstResult').css('display', 'block');
                                $('#gstRegNo').val(data.fields.registration_number);
                                $('#gstLegalName').val(data.fields.legal_name);
                                $('#gstTradeName').val(data.fields.trade_name);
                                $('#gstAddress').val(data.fields.address);
                                $('#gstDateOfLiability').val(data.fields.date_of_liability);
                                $('#gstPeriodOfValidity').val(data.fields.date_of_issue);
                                $('#gstTo').val(data.fields.To);
                                $('#gstRegType').val(data.fields.type_of_registration);
                                $('#gstCoB').val(data.fields.CoB);
                                $("#gst-file-field").val("");
                                break;
                            default:
                                alert("incorrect value selected");
                        }
                    },
                    error: function (textStatus, errorThrown) {
                        debugger;
                        alert(textStatus);
                    },
                    contentType: false,
                    processData: false
                });
            }
        });
    </script>
